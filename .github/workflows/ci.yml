name: CI

on:
  pull_request:
    branches:
      - staging
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Dummy values — build must succeed without real secrets
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      CLERK_SECRET_KEY: sk_test_dummy
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/oauth2callback
      GEMINI_API_KEY: dummy
      GROQ_API_KEY: dummy
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  db-check:
    name: DB Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check for uncommitted migrations
        run: |
          npx drizzle-kit generate --config=drizzle.config.ts 2>&1 || true
          if [[ -n "$(git status --porcelain drizzle/)" ]]; then
            echo "❌ Uncommitted Drizzle migrations detected. Run 'npm run db:generate' and commit the output."
            git diff --name-only drizzle/
            exit 1
          else
            echo "✅ Migrations are up to date."
          fi
